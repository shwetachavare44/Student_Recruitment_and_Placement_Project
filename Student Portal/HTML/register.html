<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>

    <link rel="stylesheet" href="D:\Nexanova Intership\Student Placement and Recruitment Management System\Student Portal\CSS/register.css">
</head>

<body>

<div class="register-container">

    <div class="register-box">

        <div class="profile-icon">
            👤
        </div>

        <h2>Student Registration</h2>

        <form id="registerForm">

            <div class="form-grid">

                <div>
                    <label>Registration Number</label>
                    <input type="text" id="regNo" required>
                </div>

                <div>
                    <label>First Name</label>
                    <input type="text" id="fname" required>
                </div>

                <div>
                    <label>Last Name</label>
                    <input type="text" id="lname" required>
                </div>

                <div>
                    <label>Date of Birth</label>
                    <input type="date" id="dob" required>
                </div>

                <div>
                    <label>Address: </label>
                    <input type="text" id="location" required>
                </div>

                <div>
                    <label>Email</label>
                    <input type="email" id="email" required>
                </div>

                <div>
                    <label>Contact Number</label>
                    <input type="tel" id="mobile" required>
                </div>

                <div>
                    <label>Password</label>

                    <div class="password-box">

                        <input type="password" id="password" required>

                        <button type="button" onclick="showPassword()">👁</button>

                    </div>

                </div>

                <div>
                    <label>Confirm Password</label>
                    <input type="password" id="confirmPassword" required>
                </div>

                <div>
                    <label>Experience</label>

                    <select id="experience">
                        <option>Fresher</option>
                        <option>Experienced</option>
                    </select>

                </div>

                <div>
                    <label>Job Position Looking For</label>
                    <input type="text" id="job">
                </div>

                <div>
                    <label>Preferred Job Location</label>
                    <input type="text" id="jobLocation">
                </div>

                <div>
                    <label>Resume Upload</label>
                    <input type="file" id="resume">

                    <p id="resumeName"></p>
                </div>

            </div>

            <h3>Educational Background</h3>

            <label><input type="checkbox">10th</label>

            <label><input type="checkbox">12th</label>

            <label><input type="checkbox">Graduation</label>

            <label><input type="checkbox">Post Graduation</label>

            <label><input type="checkbox">Other</label>

            <br><br>

            <label>Skills</label>

            <textarea id="skills"></textarea>

            <label>Technical Skills</label>

            <textarea id="technical"></textarea>

            <label>Soft Skills</label>

            <textarea id="soft"></textarea>

            <label>Hobbies</label>

            <textarea id="hobbies"></textarea>

            <label>Interest</label>

            <textarea id="interest"></textarea>

            <label>Registration Progress</label>

            <div class="progress">

                <div id="progressBar"></div>

            </div>

            <button type="submit">Register</button>

            <p id="message"></p>

            <p class="register-link">

                Already Registered?

                <a href="D:\Nexanova Intership\Student Placement and Recruitment Management System\Student Portal\HTML/login.html">Login Here</a>

            </p>

        </form>

    </div>

</div>

<script src="D:\Nexanova Intership\Student Placement and Recruitment Management System\Student Portal\js/register.js"></script>

</body>
</html>
